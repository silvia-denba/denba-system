<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>DENBA 簽收單</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --blue:#0C447C;--blue-mid:#185FA5;--blue-light:#E6F1FB;--blue-pale:#F0F6FD;
  --ink:#111827;--muted:#6B7280;--border:#D1D5DB;--bg:#F4F7FB;--white:#fff;
  --red:#DC2626;--red-light:#FEF2F2;--green:#16A34A;--green-light:#DCFCE7;
  --radius:14px;--shadow:0 2px 14px rgba(12,68,124,.09);
}
body{font-family:-apple-system,"PingFang TC","Microsoft JhengHei",sans-serif;background:var(--bg);color:var(--ink);min-height:100vh}

/* Header */
header{background:var(--blue);color:#fff;padding:16px 20px 13px;display:flex;align-items:center;gap:14px;box-shadow:0 2px 10px rgba(12,68,124,.3)}
.hlogo{width:44px;height:44px;background:#fff;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--blue);letter-spacing:.5px;line-height:1.2;text-align:center}
header h1{font-size:19px;font-weight:700;letter-spacing:.3px}
header p{font-size:11px;opacity:.7;margin-top:2px}

/* Pages */
.page{display:none}.page.active{display:block}
.container{max-width:720px;margin:0 auto;padding:22px 18px 56px}

/* Progress bar */
.progress{display:flex;align-items:center;gap:0;margin-bottom:22px;background:var(--white);border-radius:40px;padding:10px 16px;box-shadow:var(--shadow)}
.step{display:flex;align-items:center;gap:7px;flex:1}
.step-num{width:24px;height:24px;border-radius:50%;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;background:var(--border);color:var(--muted);flex-shrink:0;transition:.3s}
.step-label{font-size:12px;color:var(--muted);font-weight:500;transition:.3s}
.step.done .step-num{background:var(--green);color:#fff}
.step.active .step-num{background:var(--blue-mid);color:#fff}
.step.active .step-label{color:var(--blue-mid);font-weight:700}
.step-line{flex:1;height:1.5px;background:var(--border);margin:0 6px}

/* Cards */
.card{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);padding:20px;margin-bottom:16px}
.card-title{font-size:11px;font-weight:700;color:var(--blue-mid);text-transform:uppercase;letter-spacing:1px;margin-bottom:16px;padding-bottom:9px;border-bottom:2px solid var(--blue-light);display:flex;align-items:center;gap:7px}

/* Form */
.field{margin-bottom:15px}
label.fl{display:block;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:6px}
label.fl .req{color:var(--red);margin-left:2px}
input,textarea,select{width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:10px;font-size:16px;font-family:inherit;color:var(--ink);background:var(--white);transition:border-color .2s,box-shadow .2s;-webkit-appearance:none;appearance:none}
input:focus,textarea:focus,select:focus{outline:none;border-color:var(--blue-mid);box-shadow:0 0 0 3px rgba(24,95,165,.12)}
input.err,select.err{border-color:var(--red);background:var(--red-light)}
textarea{resize:none}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:480px){.row2{grid-template-columns:1fr}}

/* Toggle customer type */
.type-toggle{display:flex;gap:8px;margin-bottom:14px}
.type-btn{flex:1;padding:11px;border-radius:10px;font-size:15px;font-weight:600;font-family:inherit;border:2px solid var(--border);background:var(--white);color:var(--muted);cursor:pointer;transition:.2s;text-align:center}
.type-btn.active{border-color:var(--blue-mid);background:var(--blue-light);color:var(--blue-mid)}

/* Machine selector */
.machine-list{display:flex;flex-direction:column;gap:10px}
.machine-row{background:var(--blue-pale);border:1.5px solid var(--blue-light);border-radius:10px;padding:12px}
.machine-row-top{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center;margin-bottom:10px}
.machine-row select{background:var(--white)}
.qty-control{display:flex;align-items:center;gap:8px;flex-shrink:0}
.qty-btn{width:34px;height:34px;border-radius:8px;border:1.5px solid var(--blue-mid);background:var(--white);color:var(--blue-mid);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:300;line-height:1;flex-shrink:0}
.qty-btn:active{background:var(--blue-light)}
.qty-num{font-size:17px;font-weight:700;color:var(--blue);min-width:24px;text-align:center}
.serial-section{border-top:1px dashed var(--blue-light);padding-top:10px;margin-top:2px;display:flex;flex-direction:column;gap:7px}
.serial-row{display:flex;align-items:center;gap:8px}
.serial-tag{font-size:11px;color:var(--blue-mid);font-weight:600;flex-shrink:0;min-width:48px}
.serial-row input{font-size:14px;padding:9px 12px}
.del-machine{background:none;border:none;color:#9CA3AF;font-size:20px;cursor:pointer;padding:2px 4px;line-height:1;flex-shrink:0}
.del-machine:hover{color:var(--red)}
.add-machine-btn{width:100%;padding:12px;border:2px dashed var(--blue-mid);border-radius:10px;background:var(--blue-light);color:var(--blue-mid);font-size:15px;font-weight:600;cursor:pointer;margin-top:4px;transition:.2s}
.add-machine-btn:hover{background:#D6E4F8}

/* Accessory */
.acc-list{display:flex;flex-direction:column;gap:8px}
.acc-row{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--bg);border-radius:9px;border:1px solid var(--border)}
.acc-check{width:20px;height:20px;border-radius:5px;border:2px solid var(--border);flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;background:var(--white);transition:.15s}
.acc-check.checked{background:var(--blue-mid);border-color:var(--blue-mid)}
.acc-check.checked::after{content:'✓';color:#fff;font-size:13px;font-weight:700}
.acc-name{flex:1;font-size:14px;color:var(--ink)}
.acc-qty-wrap{display:flex;align-items:center;gap:6px}
.acc-qty-btn{width:28px;height:28px;border-radius:6px;border:1.5px solid var(--border);background:var(--white);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:300}
.acc-qty-btn:active{background:var(--bg)}
.acc-qty-num{font-size:14px;font-weight:700;min-width:20px;text-align:center}

/* Return agree */
.agree-box{display:flex;gap:12px;align-items:flex-start;padding:14px;border:2px solid var(--border);border-radius:10px;cursor:pointer;transition:.2s;background:var(--white)}
.agree-box.checked{border-color:var(--blue-mid);background:var(--blue-light)}
.agree-box.err-box{border-color:var(--red);background:var(--red-light)}
.agree-chk{width:22px;height:22px;border-radius:6px;border:2px solid var(--border);flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;background:var(--white);transition:.15s}
.agree-box.checked .agree-chk{background:var(--blue-mid);border-color:var(--blue-mid)}
.agree-box.checked .agree-chk::after{content:'✓';color:#fff;font-size:14px;font-weight:700}
.agree-text{font-size:13px;line-height:1.7;color:var(--ink)}
.agree-text b{color:var(--blue-mid)}
.req-note{font-size:11px;color:var(--red);margin-top:5px;display:none}
.req-note.show{display:block}

/* Buttons */
.btn{padding:15px 24px;border-radius:11px;font-size:17px;font-weight:700;font-family:inherit;cursor:pointer;border:none;transition:transform .1s,opacity .2s;width:100%}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--blue-mid);color:#fff}
.btn-primary:hover{background:var(--blue)}
.btn-ghost{background:transparent;color:var(--blue-mid);border:2px solid var(--blue-mid);font-size:15px;padding:12px}
.btn-success{background:var(--green);color:#fff}

/* Login page */
.login-wrap{max-width:420px;margin:40px auto;padding:0 18px}
.login-card{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);padding:32px 28px}
.login-logo{text-align:center;margin-bottom:24px}
.login-logo .brand{font-size:28px;font-weight:800;color:var(--blue);letter-spacing:1px}
.login-logo .sub{font-size:13px;color:var(--muted);margin-top:4px}

/* Signature */
.sig-summary{background:var(--blue-light);border-radius:12px;padding:14px 18px;margin-bottom:16px;font-size:13px;line-height:1.8}
.sig-summary b{color:var(--blue)}
.sig-canvas-wrap{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px;margin-bottom:14px}
.sig-canvas-label{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.7px;margin-bottom:10px}
#sig-canvas{display:block;width:100%;height:220px;border:2px dashed var(--border);border-radius:10px;background:#FAFAFA;touch-action:none;cursor:crosshair}
#sig-canvas.signed{border-color:var(--blue-mid);border-style:solid}
.sig-hint{text-align:center;font-size:12px;color:var(--muted);margin-top:6px}
.sig-actions{display:flex;gap:10px;margin-bottom:16px}
.sig-actions .btn{flex:1}

/* Done page */
.done-card{text-align:center;background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);padding:36px 24px;margin-bottom:18px}
.done-icon{width:72px;height:72px;background:var(--green-light);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:36px;margin:0 auto 16px}
.done-card h2{font-size:22px;margin-bottom:6px;color:var(--green)}
.done-card p{color:var(--muted);font-size:14px}
.doc-number{font-size:24px;font-weight:800;color:var(--blue);font-family:monospace;margin-top:10px}

/* Receipt preview */
.receipt-preview{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);padding:22px;margin-bottom:18px;font-size:13px}
.receipt-preview h3{font-size:15px;color:var(--blue);border-bottom:2px solid var(--blue-light);padding-bottom:9px;margin-bottom:14px;font-weight:700}
.rr{display:flex;justify-content:space-between;align-items:baseline;flex-wrap:wrap;gap:4px;padding:3px 0}
.rr .k{color:var(--muted);font-size:12px;flex-shrink:0}
.rr .v{font-weight:600;text-align:right}
hr.dash{border:none;border-top:1.5px dashed var(--border);margin:10px 0}
.sig-img-preview{width:100%;max-height:110px;object-fit:contain;border:1px solid var(--border);border-radius:8px;background:#FAFAFA;margin-top:8px}
.machine-preview-item{background:var(--blue-light);border-radius:7px;padding:7px 10px;margin-bottom:5px}
.machine-preview-item .mn{font-size:13px;font-weight:600;color:var(--blue)}
.machine-preview-item .ms{font-size:11px;color:var(--blue-mid);margin-top:2px}
.acc-preview-item{display:flex;justify-content:space-between;font-size:12px;padding:3px 0;border-bottom:0.5px solid var(--border)}
.acc-preview-item:last-child{border:none}

.action-btns{display:flex;flex-direction:column;gap:10px}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:11px 22px;border-radius:32px;font-size:13px;font-weight:600;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;z-index:99}
.toast.show{opacity:1}

@media print{
  header,.progress,.sig-actions,.action-btns,.btn{display:none!important}
  .page{display:block!important}
  #login-page,#form-page,#sig-page{display:none!important}
  .receipt-preview{box-shadow:none;border:1px solid #ccc}
  body{background:#fff}
}
</style>
</head>
<body>

<!-- ═══ LOGIN ═══ -->
<div id="login-page" class="page active">
<header>
  <div class="hlogo">DENBA</div>
  <div><h1>DENBA 簽收單</h1><p>業務行動簽收系統</p></div>
</header>
<div class="login-wrap">
  <div class="login-card">
    <div class="login-logo">
      <div class="brand">DENBA</div>
      <div class="sub">簽收單系統　業務登入</div>
    </div>
    <div class="field">
      <label class="fl">經銷商<span class="req">*</span></label>
      <select id="login-dealer">
        <option value="">請選擇經銷商</option>
        <option>Denba Taiwan 總代理</option>
        <option>台北經銷商</option>
        <option>中部經銷商</option>
        <option>南區經銷商</option>
        <option>東區經銷商</option>
      </select>
    </div>
    <div class="field">
      <label class="fl">業務姓名<span class="req">*</span></label>
      <input type="text" id="login-sales" placeholder="請輸入您的姓名" inputmode="text">
    </div>
    <button class="btn btn-primary" onclick="doLogin()" style="margin-top:8px">進入填單 →</button>
  </div>
</div>
</div>

<!-- ═══ FORM ═══ -->
<div id="form-page" class="page">
<header>
  <div class="hlogo">DENBA</div>
  <div><h1>DENBA 簽收單</h1><p id="header-dealer-name" style="font-size:11px;opacity:.75"></p></div>
</header>
<div class="container">

  <div class="progress">
    <div class="step active" id="step1"><div class="step-num">1</div><div class="step-label">填單</div></div>
    <div class="step-line"></div>
    <div class="step" id="step2"><div class="step-num">2</div><div class="step-label">簽名</div></div>
    <div class="step-line"></div>
    <div class="step" id="step3"><div class="step-num">3</div><div class="step-label">完成</div></div>
  </div>

  <!-- 客戶資訊 -->
  <div class="card">
    <div class="card-title">👤 客戶資訊</div>
    <div class="type-toggle">
      <button class="type-btn active" id="btn-company" onclick="setType('company')">🏢 公司戶</button>
      <button class="type-btn" id="btn-personal" onclick="setType('personal')">👤 個人戶</button>
    </div>
    <div id="company-fields">
      <div class="field">
        <label class="fl">公司名稱<span class="req">*</span></label>
        <input type="text" id="customer-company" placeholder="XX 有限公司">
      </div>
      <div class="row2">
        <div class="field">
          <label class="fl">聯絡人<span class="req">*</span></label>
          <input type="text" id="customer-contact" placeholder="陳先生">
        </div>
        <div class="field">
          <label class="fl">聯絡電話<span class="req">*</span></label>
          <input type="tel" id="customer-tel" placeholder="02-1234-5678" inputmode="tel">
        </div>
      </div>
    </div>
    <div id="personal-fields" style="display:none">
      <div class="row2">
        <div class="field">
          <label class="fl">姓名<span class="req">*</span></label>
          <input type="text" id="customer-personal-name" placeholder="王小明">
        </div>
        <div class="field">
          <label class="fl">聯絡電話<span class="req">*</span></label>
          <input type="tel" id="customer-personal-tel" placeholder="0912-345-678" inputmode="tel">
        </div>
      </div>
    </div>
    <div class="field">
      <label class="fl">交貨地址<span class="req">*</span></label>
      <input type="text" id="delivery-addr" placeholder="台北市信義路...">
    </div>
  </div>

  <!-- 機器 -->
  <div class="card">
    <div class="card-title">🖨️ 交付機器清單</div>
    <div class="machine-list" id="machine-list"></div>
    <button class="add-machine-btn" onclick="addMachine()">＋ 新增機器</button>
  </div>

  <!-- 配件 -->
  <div class="card">
    <div class="card-title">📦 配件清單</div>
    <div class="acc-list" id="acc-list"></div>
  </div>

  <!-- 備註 & 退貨同意 -->
  <div class="card">
    <div class="card-title">📋 備註 ／ 同意事項</div>
    <div class="field">
      <label class="fl">備註</label>
      <textarea id="remarks" rows="3" placeholder="安裝注意事項、特殊需求…"></textarea>
    </div>
    <div class="field">
      <div class="agree-box" id="agree-box" onclick="toggleAgree()">
        <div class="agree-chk" id="agree-chk"></div>
        <div>
          <div class="agree-text">我同意辦理退貨時，由 <b>Denba Taiwan</b> 代為處理發票及銷貨退回證明單，以加速退貨退款作業。</div>
          <div style="font-size:11px;color:var(--red);margin-top:4px;font-weight:600">* 必須勾選才能繼續</div>
        </div>
      </div>
      <div class="req-note" id="agree-err">請勾選同意事項才能繼續</div>
    </div>
  </div>

  <button class="btn btn-primary" onclick="goToSign()">前往客戶簽名 →</button>
</div>
</div>

<!-- ═══ SIGN ═══ -->
<div id="sig-page" class="page">
<header>
  <div class="hlogo">DENBA</div>
  <div><h1>DENBA 簽收單</h1><p style="font-size:11px;opacity:.75">請確認資料後簽名</p></div>
</header>
<div class="container">

  <div class="progress">
    <div class="step done" id="sig-step1"><div class="step-num">1</div><div class="step-label">填單</div></div>
    <div class="step-line"></div>
    <div class="step active" id="sig-step2"><div class="step-num">2</div><div class="step-label">簽名</div></div>
    <div class="step-line"></div>
    <div class="step" id="sig-step3"><div class="step-num">3</div><div class="step-label">完成</div></div>
  </div>

  <div class="sig-summary" id="sig-summary"></div>

  <div class="sig-canvas-wrap">
    <div class="sig-canvas-label">✍️ 客戶簽名</div>
    <canvas id="sig-canvas"></canvas>
    <div class="sig-hint">請在上方區域用手指簽名確認</div>
  </div>

  <div class="field" style="margin-bottom:14px">
    <label class="fl">簽名者姓名<span class="req">*</span></label>
    <input type="text" id="signer-name" placeholder="請輸入簽名者姓名">
  </div>

  <div class="sig-actions">
    <button class="btn btn-ghost" onclick="clearSig()">清除重簽</button>
    <button class="btn btn-ghost" onclick="goBack()">← 返回修改</button>
  </div>

  <button class="btn btn-primary" onclick="submitReceipt()">確認送出簽收單 ✓</button>
</div>
</div>

<!-- ═══ DONE ═══ -->
<div id="done-page" class="page">
<header>
  <div class="hlogo">DENBA</div>
  <div><h1>DENBA 簽收單</h1><p style="font-size:11px;opacity:.75">簽收完成</p></div>
</header>
<div class="container">

  <div class="progress">
    <div class="step done"><div class="step-num">1</div><div class="step-label">填單</div></div>
    <div class="step-line"></div>
    <div class="step done"><div class="step-num">2</div><div class="step-label">簽名</div></div>
    <div class="step-line"></div>
    <div class="step done active"><div class="step-num">3</div><div class="step-label">完成</div></div>
  </div>

  <div class="done-card">
    <div class="done-icon">✅</div>
    <h2>簽收完成！</h2>
    <p id="done-time"></p>
    <div class="doc-number" id="done-docno"></div>
  </div>

  <div class="receipt-preview" id="receipt-preview"></div>

  <div class="action-btns">
    <button class="btn btn-primary" onclick="downloadReceipt()">⬇ 下載簽收單圖片</button>
    <button class="btn btn-success" onclick="newReceipt()">新增下一張簽收單</button>
  </div>
</div>
</div>

<div class="toast" id="toast"></div>
<canvas id="export-canvas" style="display:none"></canvas>

<script>
// ── 動態清單（從 GAS 載入，預設值為備用）──
let MACHINES    = ['MFC-L3750CDW','MFC-L8900CDW','HL-L8360CDW','HL-L9310CDW','MFC-J5945DW','DCP-L2540DW','MFC-L2770DW','其他（請於備註說明）'];
let ACCESSORIES = ['黑色碳粉匣','青色碳粉匣','洋紅色碳粉匣','黃色碳粉匣','感光鼓','廢粉盒','電源線','USB傳輸線','無線網路卡','進紙匣'];
let DEALERS     = ['Denba Taiwan 總代理','台北經銷商','中部經銷商','南區經銷商','東區經銷商'];

// ── State ──
let customerType = 'company';
let agreeChecked = false;
let machineCount = 0;
let hasSig = false;
let canvas, ctx, drawing = false;
let currentDocNo = '';
let currentSigData = '';
let salesName = '';
let dealerName = '';

// ── 從 GAS 載入清單 ──
async function fetchLists(){
  if(GAS_URL === 'YOUR_GAS_URL_HERE') return;
  try{
    const res = await fetch(GAS_URL + '?action=getLists');
    const d   = await res.json();
    if(d.dealers  && d.dealers.length)  DEALERS     = d.dealers;
    if(d.machines && d.machines.length) MACHINES    = d.machines;
    if(d.accs     && d.accs.length)     ACCESSORIES = d.accs;
    // 更新登入頁經銷商下拉
    const sel = document.getElementById('login-dealer');
    const cur = sel.value;
    sel.innerHTML = '<option value="">請選擇經銷商</option>'
      + DEALERS.map(d=>'<option'+(d===cur?' selected':'')+'>'+d+'</option>').join('');
  } catch(e){ console.log('fetchLists failed', e); }
}

// ── Login ──
async function doLogin(){
  const dealer = document.getElementById('login-dealer').value.trim();
  const sales  = document.getElementById('login-sales').value.trim();
  if(!dealer){toast('請選擇經銷商');return}
  if(!sales){toast('請輸入業務姓名');return}
  // 每次登入前重新抓最新清單
  const loginBtn = document.querySelector('#login-page .btn-primary');
  if(loginBtn){ loginBtn.textContent = '載入最新清單…'; loginBtn.disabled = true; }
  await fetchLists();
  if(loginBtn){ loginBtn.textContent = '進入填單 →'; loginBtn.disabled = false; }
  const dealerFinal = document.getElementById('login-dealer').value.trim();
  if(!dealerFinal){ toast('請重新選擇經銷商'); return; }
  dealerName = dealerFinal;
  salesName  = sales;
  document.getElementById('header-dealer-name').textContent = dealerFinal + '　業務：' + sales;
  showPage('form-page');
  initAccList();
}

// ── Customer type ──

  document.getElementById('btn-company').classList.toggle('active', t==='company');
  document.getElementById('btn-personal').classList.toggle('active', t==='personal');

// ── Agree toggle ──
function toggleAgree(){

// ── Machine rows ──
function addMachine(){
  machineCount++;
  const id = machineCount;
  const list = document.getElementById('machine-list');
  const div = document.createElement('div');
  div.className = 'machine-row';
  div.id = 'mrow-' + id;
  div.innerHTML = `
    <div class="machine-row-top">
      <select class="m-sel" onchange="updateSerials(${id})">
        <option value="">選擇機器型號</option>
        ${MACHINES.map(m=>`<option>${m}</option>`).join('')}
      </select>
      <div style="display:flex;align-items:center;gap:6px">
        <div class="qty-control">
          <button class="qty-btn" onclick="changeQty(${id},-1)">−</button>
          <span class="qty-num" id="qty-${id}">1</span>
          <button class="qty-btn" onclick="changeQty(${id},+1)">＋</button>
        </div>
        <button class="del-machine" onclick="delMachine(${id})" title="刪除">✕</button>
      </div>
    </div>
    <div class="serial-section" id="serials-${id}">
      <div class="serial-row"><span class="serial-tag">序號 1</span><input type="text" placeholder="機器序號或資產編號" style="font-size:14px;padding:9px 12px"></div>
    </div>
  `;
  list.appendChild(div);
}

function changeQty(id, delta){
  const el = document.getElementById('qty-'+id);
  let q = parseInt(el.textContent) + delta;
  if(q < 1) q = 1;
  if(q > 20) q = 20;
  el.textContent = q;
  updateSerials(id);
}

function updateSerials(id){
  const q = parseInt(document.getElementById('qty-'+id).textContent);
  const sec = document.getElementById('serials-'+id);
  // preserve existing values
  const existing = Array.from(sec.querySelectorAll('input')).map(i=>i.value);
  sec.innerHTML = '';
  for(let i=1;i<=q;i++){
    const row = document.createElement('div');
    row.className = 'serial-row';
    row.innerHTML = `<span class="serial-tag">序號 ${i}</span><input type="text" placeholder="機器序號或資產編號" style="font-size:14px;padding:9px 12px" value="${existing[i-1]||''}">`;
    sec.appendChild(row);
  }
}

function delMachine(id){
  const el = document.getElementById('mrow-'+id);
  if(el) el.remove();
}

function getMachines(){
  const rows = document.querySelectorAll('.machine-row');
  const arr = [];
  rows.forEach(r=>{
    const model = r.querySelector('.m-sel').value;
    const qty   = parseInt(r.querySelector('.qty-num').textContent);
    const serials = Array.from(r.querySelectorAll('.serial-section input')).map(i=>i.value.trim());
    if(model) arr.push({model, qty, serials});
  });
  return arr;
}

// ── Accessory list ──
function initAccList(){
  const list = document.getElementById('acc-list');
  list.innerHTML = '';
  ACCESSORIES.forEach((name,i)=>{
    const div = document.createElement('div');
    div.className = 'acc-row';
    div.id = 'acc-'+i;
    div.innerHTML = `
      <div class="acc-check" id="acc-chk-${i}" onclick="toggleAcc(${i})"></div>
      <span class="acc-name">${name}</span>
      <div class="acc-qty-wrap" id="acc-qty-wrap-${i}" style="display:none">
        <button class="acc-qty-btn" onclick="changeAccQty(${i},-1)">−</button>
        <span class="acc-qty-num" id="acc-qty-${i}">1</span>
        <button class="acc-qty-btn" onclick="changeAccQty(${i},+1)">＋</button>
      </div>
    `;
    list.appendChild(div);
  });
}

function toggleAcc(i){
  const chk  = document.getElementById('acc-chk-'+i);
  const wrap = document.getElementById('acc-qty-wrap-'+i);
  const on   = chk.classList.toggle('checked');
  wrap.style.display = on ? 'flex' : 'none';
}

function changeAccQty(i, delta){
  const el = document.getElementById('acc-qty-'+i);
  let q = parseInt(el.textContent) + delta;
  if(q < 1) q = 1;
  el.textContent = q;
}

function getAccessories(){
  return ACCESSORIES.map((name,i)=>{
    const chk = document.getElementById('acc-chk-'+i);
    if(!chk || !chk.classList.contains('checked')) return null;
    const qty = parseInt(document.getElementById('acc-qty-'+i).textContent);
    return {name, qty};
  }).filter(Boolean);
}

// ── Validation & go to sign ──
function goToSign(){
  let ok = true;

  // customer
  if(customerType === 'company'){
    const co = v('customer-company'); const ct = v('customer-contact'); const tel = v('customer-tel');
    if(!co){markErr('customer-company');ok=false}
    if(!ct){markErr('customer-contact');ok=false}
    if(!tel){markErr('customer-tel');ok=false}
  } else {
    const nm = v('customer-personal-name'); const tel = v('customer-personal-tel');
    if(!nm){markErr('customer-personal-name');ok=false}
    if(!tel){markErr('customer-personal-tel');ok=false}
  }
  const addr = v('delivery-addr');
  if(!addr){markErr('delivery-addr');ok=false}

  const machines = getMachines();

  }

  // build summary

  const machineLines = machines.map(m=>`${m.model} × ${m.qty}`).join('、');

    <b>客戶：</b>${customerLabel}<br>

function markErr(id){

function goBack(){ showPage('form-page'); }

// ── Signature canvas ──
function initCanvas(){
  canvas = document.getElementById('sig-canvas');
  ctx = canvas.getContext('2d');
  const rect = canvas.getBoundingClientRect();
  canvas.width  = rect.width  * (window.devicePixelRatio||1);
  canvas.height = rect.height * (window.devicePixelRatio||1);
  ctx.scale(window.devicePixelRatio||1, window.devicePixelRatio||1);
  ctx.strokeStyle = '#0C447C';
  ctx.lineWidth = 2.5;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  clearSig();
  canvas.addEventListener('touchstart', e=>{e.preventDefault();startDraw(e.touches[0])},{passive:false});
  canvas.addEventListener('touchmove',  e=>{e.preventDefault();draw(e.touches[0])},{passive:false});
  canvas.addEventListener('touchend',   endDraw);
  canvas.addEventListener('mousedown',  startDraw);
  canvas.addEventListener('mousemove',  draw);
  canvas.addEventListener('mouseup',    endDraw);
  canvas.addEventListener('mouseleave', endDraw);
}
function pos(e){ const r=canvas.getBoundingClientRect(); return{x:e.clientX-r.left,y:e.clientY-r.top}; }
function startDraw(e){ drawing=true; ctx.beginPath(); const p=pos(e); ctx.moveTo(p.x,p.y); }
function draw(e){
  if(!drawing)return;
  const p=pos(e); ctx.lineTo(p.x,p.y); ctx.stroke(); ctx.beginPath(); ctx.moveTo(p.x,p.y);
  hasSig=true; canvas.classList.add('signed');
}
function endDraw(){ drawing=false; }
function clearSig(){
  if(!canvas)return;
  const r=canvas.getBoundingClientRect();
  ctx.clearRect(0,0,r.width,r.height);
  ctx.fillStyle='#FAFAFA'; ctx.fillRect(0,0,r.width,r.height);
  hasSig=false; canvas.classList.remove('signed');
}

// ── Submit ──
async function submitReceipt(){
  if(!hasSig){toast('請完成客戶簽名');return}
  const signer = v('signer-name');
  if(!signer){toast('請輸入簽名者姓名');return}

  const docNo = await getDocNo();
  currentDocNo = docNo;
  currentSigData = canvas.toDataURL('image/png');
  const now = nowStr();

  const machines = getMachines();
  const accs = getAccessories();
  const customerLabel = customerType==='company'
    ? v('customer-company') : v('customer-personal-name')+'（個人）';
  const contact = customerType==='company' ? v('customer-contact') : v('customer-personal-name');
  const tel = customerType==='company' ? v('customer-tel') : v('customer-personal-tel');

  // build receipt preview HTML
  const machineRows = machines.map(m=>`
    <div class="machine-preview-item">
      <div class="mn">${m.model}　× ${m.qty}</div>
      ${m.serials.filter(s=>s).length ? `<div class="ms">序號：${m.serials.filter(s=>s).join('、')}</div>` : ''}
    </div>`).join('');
  const accRows = accs.length ? accs.map(a=>`<div class="acc-preview-item"><span>${a.name}</span><span>× ${a.qty}</span></div>`).join('') : '<div style="font-size:12px;color:var(--muted)">無</div>';

  document.getElementById('receipt-preview').innerHTML = `
    <h3>📄 簽收單 ${docNo}</h3>
    <div class="rr"><span class="k">簽收時間</span><span class="v">${now}</span></div>
    <div class="rr"><span class="k">業務</span><span class="v">${salesName}（${dealerName}）</span></div>
    <hr class="dash">
    <div class="rr"><span class="k">客戶</span><span class="v">${customerLabel}</span></div>
    ${customerType==='company'?`<div class="rr"><span class="k">聯絡人</span><span class="v">${contact}</span></div>`:''}
    <div class="rr"><span class="k">電話</span><span class="v">${tel}</span></div>
    <div class="rr"><span class="k">地址</span><span class="v">${v('delivery-addr')}</span></div>
    <hr class="dash">
    ${machineRows}
    <hr class="dash">
    ${accRows}
    <hr class="dash">
    <div class="rr"><span class="k">備註</span><span class="v">${v('remarks')||'無'}</span></div>
    <div class="rr"><span class="k">退貨同意</span><span class="v" style="color:var(--green)">✓ 已同意</span></div>
    <hr class="dash">
    <div class="rr"><span class="k">簽名者</span><span class="v">${signer}</span></div>
    <img src="${currentSigData}" class="sig-img-preview" alt="客戶簽名">
    <div style="margin-top:10px;font-size:11px;color:var(--muted);text-align:center;line-height:1.7">
      本人確認已收到上列機器及配件，並同意退貨時由 Denba Taiwan 代為處理相關單據。<br>
      ${signer}　${now}
    </div>
  `;

  document.getElementById('done-time').textContent = '簽收時間：' + now;
  document.getElementById('done-docno').textContent = docNo;
  showPage('done-page');

  // save to backend
  saveToSheet({docNo, now, dealer:dealerName, sales:salesName, customerType,
    customerLabel, contact, tel, addr:v('delivery-addr'),
    machines, accs, remarks:v('remarks'), signer, agree:true});
}

// ── Get doc number from Google Apps Script ──
const GAS_URL = 'https://script.google.com/macros/s/AKfycbwp0U-SL39uFxSLBV5GOnT-9p5JkBeQ-fFMiMovhPx9FVSyVSsvs_yzx-bgNBN4r3E/exec'; // 設定後換成您的 GAS 網址

async function getDocNo(){
  try{
    const res = await fetch(GAS_URL + '?action=getDocNo');
    const d = await res.json();
    if(d.docNo) return d.docNo;
  } catch(e){}
  // fallback: local
  const key = 'denba_seq';
  let seq = parseInt(localStorage.getItem(key)||'0') + 1;
  localStorage.setItem(key, seq);
  const d = new Date();
  const yy = String(d.getFullYear()-1911).slice(-2);
  const mm = String(d.getMonth()+1).padStart(2,'0');
  const dd = String(d.getDate()).padStart(2,'0');
  return yy+mm+dd+String(seq).padStart(3,'0');
}

async function saveToSheet(data){
  if(GAS_URL === 'YOUR_GAS_URL_HERE') return;
  try{
    // 第一次：先送文字資料（不含簽名圖，避免資料太大）
    const res = await fetch(GAS_URL+'?action=save', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({...data, sigData: currentSigData})
    });
    const result = await res.json();
    if(result.pdfUrl){
      const doneCard = document.querySelector('.done-card');
      if(doneCard && !document.getElementById('pdf-link-btn')){
        const btn = document.createElement('a');
        btn.id = 'pdf-link-btn';
        btn.href = result.pdfUrl;
        btn.target = '_blank';
        btn.textContent = '📄 查看 Google Drive PDF';
        btn.style.cssText = 'display:block;margin-top:14px;padding:10px 20px;background:#E6F1FB;color:#185FA5;border-radius:9px;font-size:14px;font-weight:600;text-decoration:none;text-align:center';
        doneCard.appendChild(btn);
      }
    }
    if(result.error){
      console.log('GAS error:', result.error);
      // 嘗試不帶簽名重送
      const res2 = await fetch(GAS_URL+'?action=save', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({...data, sigData: ''})
      });
      const result2 = await res2.json();
      console.log('retry result:', result2);
    }
  } catch(e){
    console.log('save failed, retrying without sig:', e);
    // 網路或大小問題，不帶簽名重試一次
    try{
      await fetch(GAS_URL+'?action=save', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({...data, sigData: ''})
      });
    } catch(e2){ console.log('retry also failed:', e2); }
  }
}

// ── Download receipt as PNG ──
function downloadReceipt(){
  const preview = document.getElementById('receipt-preview');
  // Use html2canvas via CDN
  const s = document.createElement('script');
  s.src = 'https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
  s.onload = ()=>{
    html2canvas(preview, {scale:2, backgroundColor:'#ffffff', useCORS:true}).then(c=>{
      const link = document.createElement('a');
      link.download = currentDocNo + '.png';
      link.href = c.toDataURL('image/png');
      link.click();
      toast('已下載：' + currentDocNo + '.png');
    });
  };
  document.head.appendChild(s);
}

// ── New receipt ──
function newReceipt(){
  // reset form
  ['customer-company','customer-contact','customer-tel',
   'customer-personal-name','customer-personal-tel',
   'delivery-addr','remarks','signer-name'].forEach(id=>{
    const el=document.getElementById(id); if(el) el.value='';
  });
  setType('company');
  agreeChecked=false;
  document.getElementById('agree-box').classList.remove('checked','err-box');
  document.getElementById('agree-chk').classList.remove('checked');
  document.getElementById('agree-err').classList.remove('show');
  document.getElementById('machine-list').innerHTML='';
  machineCount=0;
  initAccList();
  showPage('form-page');
}

// ── Utils ──
function showPage(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}
function v(id){ return (document.getElementById(id)||{}).value?.trim()||''; }
function nowStr(){
  const d=new Date(),pad=n=>String(n).padStart(2,'0');
  return `${d.getFullYear()}/${pad(d.getMonth()+1)}/${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
}
let toastTimer;
function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>el.classList.remove('show'),2800);
}

// ── Init ──
fetchLists();
addMachine();
